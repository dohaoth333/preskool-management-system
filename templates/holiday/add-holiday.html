{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Ajouter un Jour Férié</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'holiday_list' %}">Jours Fériés</a></li>
                        <li class="breadcrumb-item active">Ajouter</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Messages d'erreur -->
        {% if messages %}
        <div class="row">
            <div class="col-12">
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Fermer">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST" action="{% url 'add_holiday' %}">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title"><span>Détails du Jour Férié</span></h5>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Nom du jour férié <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="name"
                                            placeholder="Ex: Aïd El Fitr"
                                            value="{{ form_data.name|default:'' }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Type <span class="text-danger">*</span></label>
                                        <select class="form-control" name="holiday_type" required>
                                            <option value="national" {% if form_data.holiday_type == 'national' %}selected{% endif %}>Jour Férié National</option>
                                            <option value="religious" {% if form_data.holiday_type == 'religious' %}selected{% endif %}>Fête Religieuse</option>
                                            <option value="school" {% if form_data.holiday_type == 'school' %}selected{% endif %}>Vacances Scolaires</option>
                                            <option value="other" {% if form_data.holiday_type == 'other' %}selected{% endif %}>Autre</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Date de début <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control" name="start_date"
                                            value="{{ form_data.start_date|default:'' }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Date de fin <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control" name="end_date"
                                            value="{{ form_data.end_date|default:'' }}" required>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-group">
                                        <label>Description <small class="text-muted">(optionnel)</small></label>
                                        <textarea class="form-control" name="description" rows="3"
                                            placeholder="Description optionnelle...">{{ form_data.description|default:'' }}</textarea>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save mr-1"></i> Enregistrer
                                    </button>
                                    <a href="{% url 'holiday_list' %}" class="btn btn-secondary ml-2">
                                        <i class="fas fa-times mr-1"></i> Annuler
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Validation côté client : end_date >= start_date
document.querySelector('form').addEventListener('submit', function(e) {
    var start = document.querySelector('input[name="start_date"]').value;
    var end = document.querySelector('input[name="end_date"]').value;
    if (start && end && end < start) {
        e.preventDefault();
        alert('La date de fin doit être égale ou postérieure à la date de début.');
    }
});
</script>
{% endblock %}
