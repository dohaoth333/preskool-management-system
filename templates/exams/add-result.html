{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Saisir une Note</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Examens</a></li>
                        <li class="breadcrumb-item active">Ajouter une note</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST" action="{% url 'add_result' %}">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title"><span>Détails de la note</span></h5>
                                </div>
                                
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Sélectionner l'examen</label>
                                        <select class="form-control" name="exam_id" required>
                                            <option value="">-- Choisissez un examen --</option>
                                            {% for exam in exams %}
                                                <option value="{{ exam.id }}">{{ exam.name }} ({{ exam.subject }})</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Sélectionner l'étudiant</label>
                                        <select class="form-control" name="student_id" required>
                                            <option value="">-- Choisissez un étudiant --</option>
                                            {% for student in students %}
                                                <option value="{{ student.id }}">{{ student.first_name }} {{ student.last_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Note obtenue (sur 20)</label>
                                        <input type="number" step="0.25" min="0" max="20" class="form-control" name="marks" placeholder="ex: 15.5" required>
                                    </div>
                                </div>
                                
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary">Valider la note</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
